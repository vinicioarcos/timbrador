name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
      - run: npm install
      - run: npm run validate:schedule
      - run: npm run typecheck
      - run: npm run build
        env:
          # app/api/reminders/deliver/route.ts llama a verifySignatureAppRouter
          # a nivel de módulo, que lanza si estas dos variables no están
          # presentes en absoluto. next build importa la ruta para recolectar
          # sus metadatos, así que necesita *algún* valor no vacío aquí — CI
          # nunca verifica una firma real, así que un valor dummy es seguro.
          QSTASH_CURRENT_SIGNING_KEY: ci-build-placeholder
          QSTASH_NEXT_SIGNING_KEY: ci-build-placeholder
